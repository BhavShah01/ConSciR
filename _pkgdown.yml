url: https://bhavshah01.github.io/ConSciR/
template:
  bootstrap: 5
  bootswatch: shiny
  light-switch: true
reference:
- title: Shiny application
  desc: Application to test and demonstrate tools in the package.
  contents:
    - run_ConSciR_app
    - run_Psychrometric_app
- title: Graphs
  desc: Tools for graphing data.
  contents:
    - graph_TRH
    - graph_psychrometric
- title: Conservation tools
  desc: Tools for the analysis of data for conservators.
  contents:
    - calcPI
    - calcIPI
    - calcLM
    - calcMould
    - calcMould_models
- title: Humidity functions
  desc: Functions for performing calculations from temperature and humidity data.
  contents:
    - calcAH
    - calcDP
    - calcFtoC
    - calcAD
    - calcSH
    - calcMR
    - calcHR
    - calcPw
    - calcPws
    - calcEnthalpy
    - calcRH_AH
    - calcRH_DP
    - calcTemp
- title: Data
  desc: In-built datasets to demonstrate functions.
  contents:
    - mydata
    - TRHdata
    - mouldtable
