url: https://bhavshah01.github.io/ConSciR/
template:
  bootstrap: 5
  bootswatch: shiny
  light-switch: true
reference:
- title: Shiny applications
  desc: Applications to test and demonstrate tools in the package.
  contents:
    - run_TidyData_app
    - run_Psychrometric_app
    - run_Mould_app
    - run_ConSciR_app
- title: Graphs
  desc: Tools for graphing data.
  contents:
    - graph_TRH
    - graph_psychrometric
- title: Conservation tools
  desc: Tools for the analysis of data for conservators.
  contents:
    - calcPI
    - calcIPI
    - calcLM
    - calcMould
    - calcMould_Zeng
    - calcMould_VTT
    - calcMould_models
- title: Humidity functions
  desc: Functions for performing calculations from temperature and humidity data.
  contents:
    - calcFtoC
    - calcAH
    - calcDP
    - calcAD
    - calcSH
    - calcMR
    - calcHR
    - calcPw
    - calcPws
    - calcEnthalpy
    - calcRH_AH
    - calcRH_DP
    - calcTemp
- title: Data
  desc: Tools to tidy data and in-built datasets to demonstrate functions.
  contents:
    - tidy_TRHdata
    - tidy_Meaco
    - mydata
    - TRHdata
    - mouldtable
    - shiny_DataUploaderServer
    - shiny_DataUploaderUI
